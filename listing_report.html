
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Weedmaps Discovery Report - Colorado</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
        <style>
    :root {
        --primary: #00ffa3;
        --secondary: #00d4ff;
        --bg: #0f172a;
        --card-bg: rgba(30, 41, 59, 0.7);
        --text: #f8fafc;
        --text-muted: #94a3b8;
        --accent: #f59e0b;
        --glass: rgba(255, 255, 255, 0.05);
        --glass-border: rgba(255, 255, 255, 0.1);
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: 'Outfit', 'Inter', sans-serif;
        background-color: var(--bg);
        background-image: 
            radial-gradient(circle at 20% 20%, rgba(0, 255, 163, 0.05) 0%, transparent 40%),
            radial-gradient(circle at 80% 80%, rgba(0, 212, 255, 0.05) 0%, transparent 40%);
        color: var(--text);
        line-height: 1.6;
        padding: 2rem;
    }

    header {
        text-align: center;
        margin-bottom: 4rem;
        padding: 3rem;
        background: var(--glass);
        backdrop-filter: blur(12px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    h1 {
        font-size: 3.5rem;
        font-weight: 800;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 0.5rem;
    }

    .meta-summary {
        font-size: 1.2rem;
        color: var(--text-muted);
    }

    .container {
        max-width: 1400px;
        margin: 0 auto;
    }

    .listing-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
        gap: 2rem;
    }

    .card {
        background: var(--card-bg);
        backdrop-filter: blur(8px);
        border: 1px solid var(--glass-border);
        border-radius: 20px;
        overflow: hidden;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        display: flex;
        flex-direction: column;
    }

    .card:hover {
        transform: translateY(-8px);
        box-shadow: 0 12px 40px rgba(0, 255, 163, 0.1);
        border-color: rgba(0, 255, 163, 0.3);
    }

    .card-header {
        padding: 1.5rem;
        display: flex;
        align-items: center;
        gap: 1.5rem;
        border-bottom: 1px solid var(--glass-border);
    }

    .avatar {
        width: 80px;
        height: 80px;
        border-radius: 16px;
        object-fit: cover;
        background: var(--glass);
        border: 2px solid var(--glass-border);
    }

    .listing-info h2 {
        font-size: 1.4rem;
        margin-bottom: 0.25rem;
    }

    .badge {
        display: inline-block;
        padding: 0.25rem 0.75rem;
        border-radius: 100px;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }

    .badge-type { background: rgba(0, 212, 255, 0.2); color: var(--secondary); }
    .badge-rating { background: rgba(245, 158, 11, 0.2); color: var(--accent); }
    .badge-open { background: rgba(0, 255, 163, 0.2); color: var(--primary); }
    .badge-closed { background: rgba(239, 68, 68, 0.2); color: #ef4444; }

    .card-body {
        padding: 1.5rem;
        flex-grow: 1;
    }

    .data-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.9rem;
    }

    .data-table tr {
        border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    .data-table td {
        padding: 0.75rem 0;
    }

    .label {
        color: var(--text-muted);
        width: 140px;
    }

    .value {
        font-weight: 500;
        text-align: right;
    }

    .promo-section {
        margin-top: 1rem;
        padding: 1rem;
        background: rgba(245, 158, 11, 0.05);
        border: 1px dashed var(--accent);
        border-radius: 12px;
    }

    .promo-title {
        color: var(--accent);
        font-weight: 700;
        font-size: 0.85rem;
        margin-bottom: 0.25rem;
    }

    .promo-body {
        font-size: 0.85rem;
    }

    .footer-actions {
        padding: 1.5rem;
        background: rgba(0, 0, 0, 0.2);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .btn {
        padding: 0.6rem 1.2rem;
        border-radius: 10px;
        text-decoration: none;
        font-weight: 600;
        transition: all 0.2s ease;
        font-size: 0.9rem;
    }

    .btn-primary {
        background: var(--primary);
        color: var(--bg);
    }

    .btn-primary:hover {
        background: #00e692;
        box-shadow: 0 0 15px rgba(0, 255, 163, 0.4);
    }

    /* Accessibility Improvements */
    .skip-link {
        position: absolute;
        top: -40px;
        left: 0;
        background: var(--primary);
        color: var(--bg);
        padding: 8px;
        z-index: 100;
        transition: top 0.3s;
        text-decoration: none;
        font-weight: bold;
        border-radius: 0 0 8px 0;
    }

    .skip-link:focus {
        top: 0;
    }

    *:focus-visible {
        outline: 2px solid var(--primary);
        outline-offset: 4px;
    }

    .empty-state {
        grid-column: 1 / -1;
        background: var(--card-bg);
        backdrop-filter: blur(8px);
        border: 1px dashed var(--glass-border);
        border-radius: 20px;
        padding: 4rem 2rem;
        text-align: center;
        color: var(--text-muted);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
    }

    .empty-state h2 {
        color: var(--text);
        font-size: 1.5rem;
    }

    @media (max-width: 768px) {
        body { padding: 1rem; }
        header { padding: 2rem 1rem; margin-bottom: 2rem; }
        h1 { font-size: 2rem; }
        .listing-grid { grid-template-columns: 1fr; }
    }
    </style>
    </head>
    <body>
        <a href="#main-content" class="skip-link">Skip to main content</a>
        <div class="container" id="main-content">
            <header>
                <h1>Colorado Discovery</h1>
                <p class="meta-summary">Found 515 matches in the region • Generated on Mar 08, 2026</p>
            </header>

            <div class="listing-grid">
    
                <div class="empty-state">
                    <h2>No listings found</h2>
                    <p>Try adjusting your filters or searching a different region.</p>
                </div>
        
            </div>
        </div>
    </body>
    </html>
